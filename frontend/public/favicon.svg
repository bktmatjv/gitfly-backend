<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4077FF"/>
      <stop offset="100%" stop-color="#003ECC"/>
    </linearGradient>
    <linearGradient id="lidGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6B95FF"/>
      <stop offset="100%" stop-color="#1A5FFF"/>
    </linearGradient>
    <linearGradient id="ribbonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0F4FF"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Background Circle for app icon feel -->
  <circle cx="50" cy="50" r="48" fill="#F0F4FF" />
  
  <!-- Box Base -->
  <rect x="25" y="55" width="50" height="30" rx="3" fill="url(#boxGrad)" filter="url(#shadow)"/>
  
  <!-- Box Lid -->
  <rect x="20" y="40" width="60" height="15" rx="3" fill="url(#lidGrad)" filter="url(#shadow)"/>
  
  <!-- Vertical Ribbon -->
  <rect x="44" y="40" width="12" height="45" fill="url(#ribbonGrad)"/>
  
  <!-- Bow -->
  <path d="M50 40 C35 25, 20 40, 48 40 Z" fill="url(#boxGrad)"/>
  <path d="M50 40 C65 25, 80 40, 52 40 Z" fill="url(#boxGrad)"/>
  
  <!-- Bow Knots / Details -->
  <circle cx="50" cy="40" r="4" fill="#FFFFFF"/>
</svg>